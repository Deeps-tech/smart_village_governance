# Server Configuration
server.port=8080

# Spring Data MongoDB Configuration
# Connection URI can be passed via environment variable MONGODB_URI
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_village_db}
spring.data.mongodb.database=smart_village_db

# JWT Configuration Properties
# Secret key must be at least 256 bits (32 characters)
jwt.secret=s3cr3tKeyForSm4rtV1ll4g3Gov3rn4nc3Pl4tf0rmSIH2026!
# Token expiration time: 1 day (86400000 ms)
jwt.expiration-ms=86400000
# Refresh token expiration time: 7 days (604800000 ms)
jwt.refresh-expiration-ms=604800000

# JSON Serialization Configuration
spring.jackson.deserialization.fail-on-unknown-properties=false

# File upload properties (for grievance attachments)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.com.smartvillage.governance=DEBUG
